batch_size: 2
config: configs/baseline_csl100.yaml
dataset: csl100
dataset_info:
  dataset_root: /root/autodl-tmp/SLR_dataset/color
  dict_path: ./csl100/gloss_dict.npy
  evaluation_dir: ./evaluation/slr_eval
  evaluation_gt_dir: ./csl100
  evaluation_prefix: csl100-groundtruth
decode_mode: max
device: '0'
eval:
  token_unit: char
eval_interval: 5
evaluate_tool: python
feeder: dataset.dataloader_csl.CSLFeeder
feeder_args:
  datatype: video
  drop_ratio: 1.0
  frames: 96
ignore_weights: []
load_checkpoints: ''
load_weights: ''
log_interval: 100
loss_weights:
  ConvCTC: 1.0
  SeqCTC: 1.0
model: slr_network.SLRModel
model_args:
  c2d_type: resnet18
  conv_type: 2
  ctc_disable_cudnn: true
  ctc_zero_infinity: true
  hidden_size: 256
  loss_weights:
    ConvCTC: 1.0
    SeqCTC: 1.0
  num_classes: 500
  share_classifier: false
  use_bn: true
  weight_norm: false
num_epoch: 40
num_worker: 2
optimizer_args:
  base_lr: 5.0e-05
  gamma: 0.1
  optimizer: Adam
  start_epoch: 0
  step:
  - 10
  - 20
  - 30
  weight_decay: 0.0001
phase: train
print_log: true
random_fix: true
random_seed: 1
save_interval: 5
test_batch_size: 2
train:
  clip_grad: 5.0
  ctc_zero_infinity: true
  invalid_warn_ratio: 0.05
  max_valid_loss: 10000
work_dir: ./work_dir/csl100_baseline
